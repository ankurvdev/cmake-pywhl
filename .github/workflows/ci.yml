name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint Python sources with Ruff
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/

  # ---------------------------------------------------------------------------
  # Build PyWhlConfig.cmake, compile the nanobind test extension, run tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}


      - name: Install Python test dependencies
        run: pip install pytest

      - name: Build PyWhlConfig.cmake
        run: python build.py "${{ runner.temp }}/PyWhlConfig.cmake"

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Upload PyWhlConfig.cmake artifact
        uses: actions/upload-artifact@v4
        with:
          name: PyWhlConfig-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ${{ runner.temp }}/PyWhlConfig.cmake
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish a GitHub Release when a version tag is pushed
  # Uploads the generated PyWhlConfig.cmake as the release asset.
  # Only runs after all test matrix jobs pass.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build PyWhlConfig.cmake
        run: python build.py "${{ runner.temp }}/PyWhlConfig.cmake"

      - name: Extract tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.name }}
          files: ${{ runner.temp }}/PyWhlConfig.cmake
          generate_release_notes: true
          fail_on_unmatched_files: true
