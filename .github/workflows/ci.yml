name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # Lint Python sources with Ruff
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check src/

  # Build PyWhlConfig.cmake, compile the nanobind test extension, run tests
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # uv is required by the build-backend tests (test_build_backend*).
      - name: Install Python test dependencies
        run: pip install pytest uv
      - name: Build PyWhlConfig.cmake
        run: python build.py "${{ runner.temp }}/PyWhlConfig.cmake"
      - name: Run test suite
        run: pytest tests/ -v --tb=short
      - name: Upload PyWhlConfig.cmake artifact
        uses: actions/upload-artifact@v4
        with:
          name: PyWhlConfig-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ${{ runner.temp }}/PyWhlConfig.cmake
          if-no-files-found: error

  build-wheel:
    name: Build cmake_pywhl wheel
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Set version from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Building cmake_pywhl version ${VERSION}"
          sed -i -E "s/^version[[:space:]]*=.*/version = \"${VERSION}\"/" pyproject.toml
      - name: Build wheel
        run: uv build --wheel -o dist
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          # Downloads from the run summary as cmake_pywhl-wheel.zip, containing the .whl.
          name: cmake_pywhl-wheel
          path: dist/*.whl
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, build-wheel]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build PyWhlConfig.cmake
        run: python build.py "${{ runner.temp }}/PyWhlConfig.cmake"
      - name: Download cmake_pywhl wheel
        uses: actions/download-artifact@v4
        with:
          name: cmake_pywhl-wheel
          path: dist/
      - name: Extract tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.name }}
          files: |
            ${{ runner.temp }}/PyWhlConfig.cmake
            dist/*.whl
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Publish the cmake_pywhl distribution to PyPI via Trusted Publishing (OIDC).
  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, build-wheel]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/cmake-pywhl
    permissions:
      id-token: write
    steps:
      - name: Download cmake_pywhl wheel
        uses: actions/download-artifact@v4
        with:
          name: cmake_pywhl-wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
