name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint Python sources with Ruff
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/

  # ---------------------------------------------------------------------------
  # Build PyWhlConfig.cmake, compile the nanobind test extension, run tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Install Python test dependencies
        run: pip install pytest

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: /tmp/fetchcontent-cache
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('tests/nanobind_example/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-

      - name: Build PyWhlConfig.cmake
        run: ./build.sh "$RUNNER_TEMP/PyWhlConfig.cmake"

      - name: Verify PyWhlConfig.cmake was produced
        run: |
          test -f "$RUNNER_TEMP/PyWhlConfig.cmake"
          echo "PyWhlConfig.cmake size: $(wc -c < "$RUNNER_TEMP/PyWhlConfig.cmake") bytes"

      - name: Run test suite
        env:
          CMAKE_FETCHCONTENT_BASE_DIR: /tmp/fetchcontent-cache
        run: pytest tests/ -v --tb=short

      - name: Upload PyWhlConfig.cmake artifact
        uses: actions/upload-artifact@v4
        with:
          name: PyWhlConfig-py${{ matrix.python-version }}
          path: ${{ runner.temp }}/PyWhlConfig.cmake
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish a GitHub Release when a version tag is pushed
  # Uploads the generated PyWhlConfig.cmake as the release asset.
  # Only runs after all test matrix jobs pass.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build PyWhlConfig.cmake
        run: ./build.sh "$RUNNER_TEMP/PyWhlConfig.cmake"

      - name: Extract tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.name }}
          files: ${{ runner.temp }}/PyWhlConfig.cmake
          generate_release_notes: true
          fail_on_unmatched_files: true
